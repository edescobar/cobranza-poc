services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: cobranza
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: cobranza
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cobranza"]
      interval: 5s
      timeout: 3s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama:/root/.ollama
    ports:
      - "11434:11434"
    # For a GPU droplet, uncomment to expose the GPU:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  api:
    build: ./api
    environment:
      DATABASE_URL: postgresql://cobranza:${POSTGRES_PASSWORD}@postgres:5432/cobranza
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3:8b}
    volumes:
      - ./prompts:/app/prompts:ro
      - ./web:/app/web:ro
      - ./api/main.py:/app/main.py:ro    # mounted so code changes need only a restart, not a rebuild
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN}
    depends_on:
      - api
    profiles: ["expose"]   # only starts with: docker compose --profile expose up

volumes:
  pgdata:
  ollama:

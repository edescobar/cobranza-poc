<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>cobranza-poc</title>
<style>
  :root { --bg:#141413; --panel:#1f1e1d; --line:#2e2b28; --tx:#ece9e4; --dim:#8a847c;
          --orange:#e08543; --green:#3ac7a1; --purple:#bea1f5; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--tx); font:15px/1.5 -apple-system,Segoe UI,Inter,sans-serif; }
  .wrap { max-width:760px; margin:0 auto; padding:28px 20px 80px; }
  h1 { font-size:19px; margin:0 0 2px; }
  .sub { color:var(--dim); font-size:13px; margin-bottom:22px; }
  .controls { display:flex; gap:16px; align-items:center; flex-wrap:wrap; margin-bottom:14px; }
  label { font-size:13px; color:var(--dim); display:flex; gap:7px; align-items:center; }
  select, textarea, button { font:inherit; color:var(--tx); background:var(--panel);
          border:1px solid var(--line); border-radius:9px; }
  select { padding:6px 9px; }
  textarea { width:100%; padding:12px; min-height:70px; resize:vertical; }
  .send { margin-top:10px; background:var(--orange); border:none; color:#1a1310; font-weight:600;
          padding:10px 18px; border-radius:9px; cursor:pointer; }
  .send:disabled { opacity:.5; cursor:default; }
  .quick { display:flex; gap:7px; flex-wrap:wrap; margin:10px 0 4px; }
  .quick button { font-size:12px; padding:5px 10px; color:var(--dim); cursor:pointer; }
  .cards { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-top:22px; }
  @media(max-width:640px){ .cards{ grid-template-columns:1fr; } }
  .card { background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:14px; }
  .card h3 { font-size:12px; text-transform:uppercase; letter-spacing:.06em; margin:0 0 8px; color:var(--dim); }
  .card.on h3 { color:var(--green); }
  .reply { white-space:pre-wrap; min-height:48px; }
  .meta { margin-top:12px; padding-top:10px; border-top:1px solid var(--line); font-size:12px; color:var(--dim); }
  .badge { display:inline-block; background:#2a2622; border:1px solid var(--line); border-radius:999px;
           padding:2px 9px; font-size:11px; margin-right:6px; color:var(--purple); }
  .lat { color:var(--orange); }
  .spin { color:var(--dim); font-style:italic; }
</style>
</head>
<body>
<div class="wrap">
  <h1>cobranza-poc</h1>
  <div class="sub">Escribí lo que dice el deudor. Compará la respuesta <b>con patrones</b> (usa lo que
    convierte) vs <b>sin patrones</b> (modelo pelado). Fijate en la latencia para el bake-off de modelos.</div>

  <div class="controls">
    <label>Modelo
      <select id="model">
        <option value="">(default del server)</option>
        <option value="qwen2.5:3b">qwen2.5:3b</option>
        <option value="qwen2.5:7b">qwen2.5:7b</option>
        <option value="qwen2.5:1.5b">qwen2.5:1.5b</option>
      </select>
    </label>
  </div>

  <textarea id="text" placeholder="No tengo plata este mes..."></textarea>
  <div class="quick">
    <button data-t="No tengo plata este mes">no tengo plata</button>
    <button data-t="Ya pagué, no me molesten">ya pagué</button>
    <button data-t="¿Quién habla? No conozco esta deuda">no conozco</button>
    <button data-t="Llámenme la semana que viene">postergar</button>
    <button data-t="Puedo pagar la mitad nomás">pago parcial</button>
  </div>
  <button class="send" id="send">Enviar ▸</button>
  <button class="send" id="mic" style="background:var(--accent-cyan,#8dcaf2)">🎤 Hablar</button>
  <label style="margin-left:12px"><input type="checkbox" id="speak" checked> 🔊 leer la respuesta</label>

  <div class="cards">
    <div class="card on">
      <h3>✦ Con patrones</h3>
      <div class="reply" id="r-on"></div>
      <div class="meta" id="m-on"></div>
    </div>
    <div class="card">
      <h3>Sin patrones (baseline)</h3>
      <div class="reply" id="r-off"></div>
      <div class="meta" id="m-off"></div>
    </div>
  </div>
</div>

<script>
const $ = s => document.querySelector(s);
document.querySelectorAll('.quick button').forEach(b =>
  b.onclick = () => { $('#text').value = b.dataset.t; });

async function call(patterns) {
  const model = $('#model').value || null;
  const r = await fetch('/reply', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ text: $('#text').value, patterns, model })
  });
  return r.json();
}

function render(prefix, d) {
  $(prefix === 'on' ? '#r-on' : '#r-off').textContent = d.reply || '(sin respuesta)';
  const meta = $(prefix === 'on' ? '#m-on' : '#m-off');
  let badges = '';
  if (d.objection) badges += `<span class="badge">objeción: ${d.objection}</span>`;
  if (d.tactic)    badges += `<span class="badge">táctica: ${d.tactic}</span>`;
  meta.innerHTML = badges +
    `<div class="lat">${d.model} · TTFT ${d.ttft_ms}ms · ${d.total_ms}ms total` +
    (d.tok_per_sec ? ` · ${d.tok_per_sec} tok/s` : '') + `</div>`;
}

// Spanish text-to-speech (the agent's "mouth") — works on http, no secure context needed.
function speak(text) {
  if (!$('#speak').checked || !text) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'es-MX';
  const v = window.speechSynthesis.getVoices().find(x => x.lang && x.lang.startsWith('es'));
  if (v) u.voice = v;
  window.speechSynthesis.speak(u);
}

async function runTurn() {
  const btn = $('#send'); btn.disabled = true;
  $('#r-on').innerHTML = $('#r-off').innerHTML = '<span class="spin">pensando…</span>';
  $('#m-on').textContent = $('#m-off').textContent = '';
  try {
    const [on, off] = await Promise.all([call(true), call(false)]);
    render('on', on); render('off', off);
    speak(on.reply);          // speak the pattern-guided reply aloud
  } catch (e) {
    $('#r-on').textContent = $('#r-off').textContent = 'error: ' + e;
  } finally { btn.disabled = false; }
}
$('#send').onclick = runTurn;

// Spanish speech-to-text (the agent's "ears") — NOTE: browsers require HTTPS for the mic,
// so this works on the Cloudflare https URL, not the raw http://IP.
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
if (SR) {
  const rec = new SR();
  rec.lang = 'es-MX'; rec.interimResults = false; rec.maxAlternatives = 1;
  $('#mic').onclick = () => { try { rec.start(); $('#mic').textContent = '🎤 escuchando…'; } catch (e) {} };
  rec.onresult = (e) => { $('#text').value = e.results[0][0].transcript; runTurn(); };
  rec.onerror = (e) => {
    $('#mic').textContent = '🎤 Hablar';
    if (e.error === 'not-allowed' || e.error === 'service-not-allowed')
      alert('El micrófono necesita HTTPS. Abrí la URL de Cloudflare (https://…), no la IP.');
  };
  rec.onend = () => { $('#mic').textContent = '🎤 Hablar'; };
} else {
  $('#mic').onclick = () => alert('Este navegador no soporta reconocimiento de voz — usá Chrome.');
}
</script>
</body>
</html>
